name: Upstream scraper sync

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run now even if today is outside the 2-day cadence"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: upstream-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync tracked upstream scrapers
        id: sync
        env:
          FORCE_SYNC: ${{ github.event.inputs.force || 'false' }}
          PR_BODY_PATH: .git/upstream-sync-pr-body.md
        run: python scripts/sync_upstream.py

      - name: Commit synced providers
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json package.json providers.json providers/4khdhub.js providers/4khdhub_tv.js providers/hdhub4u.js providers/hindmoviez.js providers/movieblast.js providers/moviebox.js providers/moviesdrive.js providers/streamflix.js
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync upstream Doom-addon scrapers"
            git push
          fi
