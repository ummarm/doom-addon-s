services:
  doom-addon-s:
    build: .
    container_name: doom-addon-s
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 7000
    ports:
      - "7000:7000"

  doom-addon-s-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: doom-addon-s-tunnel
    restart: unless-stopped
    depends_on:
      - doom-addon-s
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
